name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-node@f4a67bbeca970f103397d3d2b9462cf787cd2980
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm audit --audit-level=high

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-node@f4a67bbeca970f103397d3d2b9462cf787cd2980
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run lint

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-node@f4a67bbeca970f103397d3d2b9462cf787cd2980
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-node@f4a67bbeca970f103397d3d2b9462cf787cd2980
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm test

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-node@f4a67bbeca970f103397d3d2b9462cf787cd2980
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - uses: github/codeql-action/init@f3f1edbedfb4a1d188d344570834df2996d45d39
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@f3f1edbedfb4a1d188d344570834df2996d45d39

  secrets-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
